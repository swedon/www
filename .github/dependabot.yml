version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    open-pull-requests-limit: 10

    labels:
      - dependencies

    commit-message:
      prefix: deps

    groups:
      development:
        dependency-type: development

      production:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

    labels:
      - github-actions

    commit-message:
      prefix: ci
